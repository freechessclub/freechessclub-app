name: Release Electron

on:
  push:
    branches:
      - master
    paths:
      - package.json
  workflow_dispatch:
    inputs:
      force:
        description: "Run release even without version change"
        required: false
        default: "true"

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check version bump
        id: version
        shell: bash
        run: |
          set -euo pipefail
          before="${{ github.event.before }}"

          current_version=$(node -p "require('./package.json').version")

          if git cat-file -e "${before}:package.json" 2>/dev/null; then
            previous_version=$(git show "${before}:package.json" | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")
          else
            previous_version=""
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [[ "$current_version" != "$previous_version" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

          echo "version=$current_version" >> "$GITHUB_OUTPUT"

  build:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Bundle web app
        run: npm run bundle

      - name: Bundle Electron app
        run: npm exec -- webpack --config electron.webpack.js

      - name: Prepare macOS signing
        if: runner.os == 'macOS'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          missing=()
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} )); then
            printf '::error::Missing macOS signing/notarization secrets: %s\n' "${missing[*]}"
            exit 1
          fi

          api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s\n' "$APPLE_API_KEY" | perl -pe 's/\\n/\n/g' > "$api_key_path"
          chmod 600 "$api_key_path"
          echo "APPLE_API_KEY=$api_key_path" >> "$GITHUB_ENV"

      - name: Build Electron artifacts (macOS)
        if: runner.os == 'macOS'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: npm exec -- electron-builder -m --x64 --arm64 -p never --config.mac.forceCodeSigning=true

      - name: Verify macOS signing and notarization
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          app_count=0

          for app in dist/mac/*.app dist/mac-*/*.app; do
            if [[ ! -d "$app" ]]; then
              continue
            fi

            app_count=$((app_count + 1))
            codesign --verify --deep --strict --verbose=2 "$app"
            xcrun stapler validate "$app"
            spctl -a -vvv -t open --context context:primary-signature "$app"
          done

          if (( app_count == 0 )); then
            echo '::error::No macOS app bundles were found to verify.'
            exit 1
          fi

      - name: Build Electron artifacts (Windows)
        if: runner.os == 'Windows'
        run: npm exec -- electron-builder -w --x64 -p never

      - name: Build Electron artifacts (Linux)
        if: runner.os == 'Linux'
        run: npm exec -- electron-builder -l --x64 -p never

      - name: Upload Electron artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ runner.os }}
          if-no-files-found: error
          path: |
            dist/*.AppImage
            dist/*.blockmap
            dist/*.deb
            dist/*.dmg
            dist/*.exe
            dist/*.rpm
            dist/*.snap
            dist/*.tar.gz
            dist/latest*.yml
            dist/*.zip

  release:
    needs:
      - check-version
      - build
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download Electron artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: electron-*
          path: release-artifacts
          merge-multiple: true

      - name: Create or update GitHub release with auto-generated notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: true
          files: release-artifacts/*
