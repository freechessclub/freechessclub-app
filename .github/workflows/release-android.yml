name: Release Android

on:
  push:
    branches:
      - master
    paths:
      - package.json
  workflow_dispatch:
    inputs:
      track:
        description: Google Play track
        required: true
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      status:
        description: Google Play release status
        required: true
        default: completed
        type: choice
        options:
          - completed
          - draft
          - inProgress
          - halted

permissions:
  contents: read

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check version bump
        id: version
        shell: bash
        run: |
          set -euo pipefail
          before="${{ github.event.before }}"
          current_version=$(node -p "require('./package.json').version")

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [[ -n "$before" ]] && [[ "$before" != "0000000000000000000000000000000000000000" ]] && git cat-file -e "${before}:package.json" 2>/dev/null; then
            previous_version=$(git show "${before}:package.json" | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")
            if [[ "$current_version" != "$previous_version" ]]; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

          echo "version=$current_version" >> "$GITHUB_OUTPUT"

  build-android:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install deps
        run: yarn install --immutable

      - name: Decode Android keystore
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Build Android AAB
        env:
          ANDROID_VERSION_NAME: ${{ needs.check-version.outputs.version }}
          ANDROID_VERSION_CODE: ${{ 100000 + github.run_number }}
          ANDROID_KEYSTORE_PATH: release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: yarn android:ci

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ needs.check-version.outputs.version }}
          path: android/app/build/outputs/bundle/release/*.aab

  publish-non-production:
    needs:
      - check-version
      - build-android
    if: needs.check-version.outputs.changed == 'true' && github.event_name == 'workflow_dispatch' && github.event.inputs.track != 'production'
    runs-on: ubuntu-latest
    env:
      PLAY_TRACK: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.track || 'internal' }}
      PLAY_STATUS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.status || 'completed' }}
      PACKAGE_NAME: club.freechess.FreeChessClub

    steps:
      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: android-aab-${{ needs.check-version.outputs.version }}
          path: android/app/build/outputs/bundle/release

      - name: Publish to Google Play
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: android/app/build/outputs/bundle/release/*.aab
          track: ${{ env.PLAY_TRACK }}
          status: ${{ env.PLAY_STATUS }}
          releaseName: v${{ needs.check-version.outputs.version }}

  publish-production:
    needs:
      - check-version
      - build-android
    if: needs.check-version.outputs.changed == 'true' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.track == 'production'))
    runs-on: ubuntu-latest
    environment: production
    env:
      PLAY_TRACK: production
      PLAY_STATUS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.status || 'completed' }}
      PACKAGE_NAME: club.freechess.FreeChessClub

    steps:
      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: android-aab-${{ needs.check-version.outputs.version }}
          path: android/app/build/outputs/bundle/release

      - name: Publish to Google Play (production)
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: android/app/build/outputs/bundle/release/*.aab
          track: ${{ env.PLAY_TRACK }}
          status: ${{ env.PLAY_STATUS }}
          releaseName: v${{ needs.check-version.outputs.version }}
